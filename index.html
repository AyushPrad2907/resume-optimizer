<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        .result-container {
            transition: opacity 0.5s ease-in-out;
        }

        .hidden {
            opacity: 0;
            height: 0;
            overflow: hidden;
            padding: 0;
        }

        .score-circle {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 2.5rem;
            color: #ffffff;
            background: #4b5563;
        }

        .score-circle-inner {
            z-index: 10;
        }

        .score-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #d1d5db;
        }

        .score-ring-progress {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid;
            border-color: #10b981 #10b981 transparent transparent;
            transform: rotate(-45deg);
            transition: border-color 0.5s ease, transform 0.5s ease;
        }

        .score-text {
            font-size: 1.25rem;
            font-weight: 600;
            color: #4b5563;
        }

        .keyword-chip {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            opacity: 0;
            transform: translateY(10px);
            animation: slideInFade 0.3s ease-out forwards;
            color: white; /* Make text color white for better contrast with random colors */
        }
        
        .important-keyword {
            background-color: #ef4444 !important;
        }

        /* --- Animations --- */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes progressAnimation {
            from {
                transform: rotate(-45deg);
            }
            to {
                transform: rotate(315deg);
            }
        }

        @keyframes slideInFade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.8s ease-out;
        }

        .animate-pulse {
            animation: pulse 1s infinite;
        }
        
        /* New loading bar styles */
        .progress-bar-container {
            width: 100%;
            background-color: #e5e7eb;
            border-radius: 9999px;
            height: 12px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: #10b981;
            transition: width 0.5s ease-in-out;
            border-radius: 9999px;
        }
    </style>
</head>

<body class="bg-blue-50 flex flex-col items-center p-8">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-4xl animate-fade-in">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">Resume Optimizer</h1>
        <p class="text-center text-gray-600 mb-8">Paste a job description and upload your resume to get an ATS score and suggestions for improvement.</p>

        <form id="optimizer-form" class="space-y-6">
            <div>
                <label for="jd" class="block text-gray-700 font-semibold mb-2">Job Description (Paste Here)</label>
                <textarea id="jd" name="jd" rows="10"
                    class="w-full p-4 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all"
                    placeholder="Paste the job description here..."></textarea>
            </div>
            <div>
                <label for="resume" class="block text-gray-700 font-semibold mb-2">Upload Resume (PDF)</label>
                <input type="file" id="resume" name="resume" accept=".pdf"
                    class="block w-full text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 transition-all" />
            </div>
            <div class="flex justify-center">
                <button type="submit" id="submit-button"
                    class="bg-emerald-600 text-white font-bold py-3 px-8 rounded-lg shadow-md hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-500 transition-all disabled:bg-gray-400 disabled:cursor-not-allowed disabled:animate-pulse">
                    Analyze Resume
                </button>
            </div>
        </form>

        <!-- Loading Indicator with Progress Bar -->
        <div id="loading" class="hidden text-center text-gray-600 mt-8">
            <svg class="animate-spin h-8 w-8 text-emerald-500 mx-auto" xmlns="http://www.w3.org/2000/svg"
                fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                    stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
            </svg>
            <p id="loading-text" class="mt-2">Analyzing your resume, please wait...</p>
            <div class="progress-bar-container mt-4">
                <div id="progress-bar" class="progress-bar" style="width: 0%;"></div>
            </div>
        </div>

        <!-- Analysis Results Section -->
        <div id="results" class="result-container mt-8 hidden">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Analysis Results</h2>
            <div class="bg-gray-50 p-6 rounded-lg shadow-inner flex flex-col md:flex-row items-center md:items-start gap-8">
                <!-- ATS Score Pie Chart -->
                <div class="flex flex-col items-center">
                    <div class="w-40 h-40">
                        <canvas id="ats-chart"></canvas>
                    </div>
                    <!-- New ATS Percentage Display -->
                    <p id="ats-score-percentage" class="text-2xl font-bold text-gray-800 mt-2"></p>
                    <p class="score-text mt-1">ATS Score</p>
                </div>
                <!-- Details -->
                <div class="flex-grow w-full">
                    <div class="mb-4">
                        <p class="text-gray-700 font-semibold">Probability of getting shortlisted:</p>
                        <p id="probability" class="text-lg font-bold text-gray-900"></p>
                    </div>
                    <div>
                        <p class="text-gray-700 font-semibold mb-2">Missing Keywords from JD:</p>
                        <div id="missing-keywords" class="flex flex-wrap gap-2">
                            <!-- Missing keywords will be dynamically inserted here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Suggestions -->
            <div class="mt-6">
                <h3 class="text-xl font-bold text-gray-800 mb-2">Suggestions</h3>
                <ul id="suggestions-list" class="list-disc list-inside text-gray-700 space-y-2">
                    <!-- Suggestions will be dynamically inserted here -->
                </ul>
            </div>
        </div>
    </div>

    <script>
        const chartColors = {
            matched: '#22c55e',
            unmatched: '#ef4444',
        };

        const importantKeywords = new Set([
            'backend', 'frontend', 'developer', 'programmer', 'engineering', 'data', 'cloud', 'security'
        ]);

        let atsChart;
        let progressInterval;

        document.getElementById('optimizer-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const form = e.target;
            const formData = new FormData(form);

            const submitButton = document.getElementById('submit-button');
            const loadingIndicator = document.getElementById('loading');
            const resultsSection = document.getElementById('results');
            const progressBar = document.getElementById('progress-bar');
            const loadingText = document.getElementById('loading-text');

            // Show loading state and reset UI
            submitButton.disabled = true;
            submitButton.textContent = 'Analyzing...';
            loadingIndicator.classList.remove('hidden');
            resultsSection.classList.add('hidden');
            progressBar.style.width = '0%';
            loadingText.textContent = 'Analyzing your resume...';

            // Simulate progress bar animation
            let progress = 0;
            progressInterval = setInterval(() => {
                progress += 10;
                if (progress <= 90) {
                    progressBar.style.width = `${progress}%`;
                    if (progress < 30) {
                        loadingText.textContent = 'Parsing job description...';
                    } else if (progress < 60) {
                        loadingText.textContent = 'Extracting resume keywords...';
                    } else {
                        loadingText.textContent = 'Calculating ATS score...';
                    }
                } else {
                    clearInterval(progressInterval);
                }
            }, 500);

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    body: formData,
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    const messageBox = document.createElement('div');
                    messageBox.className = 'fixed inset-0 flex items-center justify-center bg-gray-800 bg-opacity-50 z-50';
                    messageBox.innerHTML = `
                        <div class="bg-white p-6 rounded-lg shadow-xl max-w-sm text-center">
                            <p class="text-gray-700 mb-4">Error: ${errorData.error || 'An unknown error occurred.'}</p>
                            <button onclick="this.parentElement.parentElement.remove()" class="bg-red-500 text-white px-4 py-2 rounded-lg">Close</button>
                        </div>
                    `;
                    document.body.appendChild(messageBox);
                    return;
                }

                const data = await response.json();
                updateUI(data);

            } catch (error) {
                console.error('Failed to fetch:', error);
                const messageBox = document.createElement('div');
                messageBox.className = 'fixed inset-0 flex items-center justify-center bg-gray-800 bg-opacity-50 z-50';
                messageBox.innerHTML = `
                    <div class="bg-white p-6 rounded-lg shadow-xl max-w-sm text-center">
                        <p class="text-gray-700 mb-4">Error: Failed to connect to the server. Please make sure the backend is running.</p>
                        <button onclick="this.parentElement.parentElement.remove()" class="bg-red-500 text-white px-4 py-2 rounded-lg">Close</button>
                    </div>
                `;
                document.body.appendChild(messageBox);
            } finally {
                // Complete progress bar and hide loading state
                clearInterval(progressInterval);
                progressBar.style.width = '100%';
                loadingText.textContent = 'Analysis complete!';

                setTimeout(() => {
                    submitButton.disabled = false;
                    submitButton.textContent = 'Analyze Resume';
                    loadingIndicator.classList.add('hidden');
                    resultsSection.classList.remove('hidden');
                }, 500); // Give a brief moment for the user to see the full progress bar
            }
        });

        function getRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }
            return color;
        }

        function updateUI(data) {
            // Update ATS Score Circle
            const atsScore = data.ats_score;
            const atsScorePercentageElement = document.getElementById('ats-score-percentage');
            atsScorePercentageElement.textContent = `${atsScore}%`;

            // Update Probability
            const probabilityElement = document.getElementById('probability');
            probabilityElement.textContent = data.probability;
            const probabilityColor = data.probability === 'High' ? 'text-green-600' : data.probability === 'Medium' ? 'text-yellow-600' : 'text-red-600';
            probabilityElement.className = 'text-lg font-bold ' + probabilityColor;

            // Update ATS Pie Chart
            if (atsChart) {
                atsChart.destroy();
            }
            const ctx = document.getElementById('ats-chart').getContext('2d');
            atsChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['Keywords Matched', 'Keywords Missing'],
                    datasets: [{
                        data: [atsScore, 100 - atsScore],
                        backgroundColor: [chartColors.matched, chartColors.unmatched],
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            display: false,
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return `${context.label}: ${context.raw}%`;
                                }
                            }
                        }
                    },
                }
            });

            // Update Missing Keywords with random colors and special styling for important words
            const missingKeywordsContainer = document.getElementById('missing-keywords');
            missingKeywordsContainer.innerHTML = '';
            data.missing_keywords.forEach((keyword, index) => {
                const span = document.createElement('span');
                span.textContent = keyword;
                span.className = 'keyword-chip';
                span.style.animationDelay = `${index * 0.05}s`;
                
                // Set color
                if (importantKeywords.has(keyword)) {
                    span.classList.add('important-keyword');
                } else {
                    span.style.backgroundColor = getRandomColor();
                }

                missingKeywordsContainer.appendChild(span);
            });

            // Update Suggestions
            const suggestionsList = document.getElementById('suggestions-list');
            suggestionsList.innerHTML = '';
            data.suggestions.forEach((suggestion, index) => {
                const li = document.createElement('li');
                li.textContent = suggestion;
                li.style.animationDelay = `${(data.missing_keywords.length * 0.05) + (index * 0.1)}s`;
                li.className = 'opacity-0 transform translate-y-2 animate-[slideInFade_0.3s_ease-out_forwards]';
                suggestionsList.appendChild(li);
            });
        }
    </script>
</body>

</html>
